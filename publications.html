<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - Evon Shahriar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-image: url('mystical.webp');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Cinzel', serif;
            color: #d3a625;
        }
        .bookshelf-container {
    background: #2a1a0a;
    border: 15px solid #1a0d05;
    border-radius: 10px;
    padding: 20px;
    margin: 40px auto;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    max-width: 1000px;
}

.shelf {
    background: #d7b889;
    margin-bottom: 30px;
    padding: 15px 0;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    border-bottom: 10px solid #a67c52;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
    position: relative;
}

.book {
    width: 40px;
    height: 180px;
    margin-right: 10px;
    background: linear-gradient(to right, #1a472a, #2a623d);
    border-radius: 0 3px 3px 0;
    box-shadow: -2px 0 5px rgba(0, 0, 0, 0.1);
    position: relative;
}

.book-title {
    color: #d3a625;
    font-family: 'Arial', sans-serif;
    font-size: 0.6em;
    word-wrap: break-word;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    position: absolute;
    top: 10px;
    left: 5px;
    right: 5px;
    bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.book::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: #d3a625;
}



        .book {
            width: 80px;
            height: 160px;
            background-color: #1a472a;
            margin-right: 15px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .book:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 100%;
            background-color: #1a472a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
        }

        .book-title {
            color: #d3a625;
            font-family: 'Cinzel', serif;
            font-size: 0.8em;
            word-wrap: break-word;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .paper-roll {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #d2b48c;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(139, 69, 19, 0.4);
            z-index: 1000;
            max-width: 80%;
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            text-align: center;
        }

        .paper-roll-content {
            color: #3E2723;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            font-size: 1em;
            line-height: 1.6;
            text-align: justify;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .paper-roll h2 {
            color: #8B4513;
            font-family: 'Cinzel', serif;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            border-bottom: 2px solid #8B4513;
            padding-bottom: 10px;
        }

        .close-paper-roll {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B4513;
            cursor: pointer;
            font-size: 1.5em;
            font-weight: bold;
            z-index: 1001;
        }

        .empty-message {
            color: #f0e6d2;
            text-align: center;
            font-style: italic;
            padding: 20px;
        }

        /* Footer styling */
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #740001;
            color: #d3a625;
            margin-top: 20px;
            font-size: 0.8em;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>
    <header id="header"></header>

    <div class="container" role="main">
        <h1>Publications</h1>

        <div class="bookshelf-container">
            <div class="shelf" id="shelf1"></div>
        </div>

        <div id="paper-roll" class="paper-roll">
            <span class="close-paper-roll">&times;</span>
            <div class="paper-roll-content"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2024 Md Evon Shahriar Sohan. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Load the header
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            });

        const publications = [
            {
                id: 1,
                title: "Optimizing development aid allocation: A data-driven approach using unsupervised machine learning and multidimensional indices",
                authors: "Sohan, M. E. S., Xiaolin, W., Sultana, S., Islam, M. M., & Anamul, M.",
                journal: "World Journal of Advanced Research and Reviews",
                year: 2023,
                volume: "19(3)",
                pages: "1393-1409",
                doi: "10.30574/wjarr.2023.19.3.1904"
            },
            {
                id: 2,
                title: "AI-driven water quality monitoring systems: A comprehensive review",
                authors: "Sohan, M. E. S., & Rahman, A.",
                journal: "Environmental Technology & Innovation",
                year: 2024,
                volume: "20(2)",
                pages: "245-260",
                doi: "10.1016/j.eti.2024.02.015"
            },
            {
                id: 3,
                title: "Sustainable urban planning: Leveraging machine learning for efficient resource allocation",
                authors: "Sohan, M. E. S., Chen, L., & Kumar, P.",
                journal: "Smart Cities",
                year: 2024,
                volume: "7(1)",
                pages: "78-95",
                doi: "10.3390/smartcities7010006"
            }
        ];

        function createBookshelf() {
            const shelf = document.getElementById('shelf1');

            if (publications.length === 0) {
                shelf.innerHTML = '<p class="empty-message">No publications available at the moment.</p>';
            } else {
                publications.forEach((pub) => {
                    const book = document.createElement('div');
                    book.className = 'book';
                    book.dataset.id = pub.id;
                    book.innerHTML = `
                        <div class="book-cover">
                            <div class="book-title">${pub.title.split(':')[0]}</div>
                        </div>
                    `;
                    shelf.appendChild(book);
                });
            }
        }

        createBookshelf();

        const paperRoll = document.getElementById('paper-roll');
        const paperRollContent = document.querySelector('.paper-roll-content');
        const closePaperRoll = document.querySelector('.close-paper-roll');

        document.querySelector('.bookshelf-container').addEventListener('click', (event) => {
            if (event.target.closest('.book')) {
                const book = event.target.closest('.book');
                const pubId = book.dataset.id;
                const publication = publications.find(p => p.id == pubId);
                
                if (publication) {
                    paperRollContent.innerHTML = `
                        <h2>${publication.title}</h2>
                        <p><strong>Authors:</strong> ${publication.authors}</p>
                        <p><strong>Published in:</strong> ${publication.journal}, ${publication.volume}, ${publication.pages} (${publication.year})</p>
                        <p><strong>DOI:</strong> <a href="https://doi.org/${publication.doi}" target="_blank">${publication.doi}</a></p>
                    `;
                    paperRoll.style.display = 'block';
                    
                    // Add animation to simulate unrolling
                    paperRoll.style.transform = 'translate(-50%, -50%) scaleY(0)';
                    setTimeout(() => {
                        paperRoll.style.transition = 'transform 0.5s ease-out';
                        paperRoll.style.transform = 'translate(-50%, -50%) scaleY(1)';
                    }, 50);
                }
            }
        });

        closePaperRoll.addEventListener('click', () => {
            // Add animation to simulate rolling up
            paperRoll.style.transition = 'transform 0.5s ease-in';
            paperRoll.style.transform = 'translate(-50%, -50%) scaleY(0)';
            setTimeout(() => {
                paperRoll.style.display = 'none';
                paperRoll.style.transition = '';
            }, 500);
        });

        window.addEventListener('click', (event) => {
            if (event.target == paperRoll) {
                paperRoll.style.display = 'none';
            }
        });
    </script>
    
</body>
</html>
