<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Journal - Md Evon Shahriar Sohan</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .book-container {
            width: 600px;
            height: 800px;
            margin: 50px auto;
            perspective: 1500px;
            position: relative;
            background-color: #8B4513;
            padding: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .clipper {
            width: 120px;
            height: 40px;
            background: #444;
            position: absolute;
            top: -20px;
            left: calc(50% - 60px);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 8px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .clipper::before {
            content: '';
            width: 100px;
            height: 20px;
            background: #666;
            position: absolute;
            top: 10px;
            border-radius: 10px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clipper::after {
            content: '';
            width: 100px;
            height: 15px;
            background: #333;
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: #F4E6C0;
            transition: transform 0.5s;
            backface-visibility: hidden;
            transform-origin: left center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .page-content {
            padding: 40px;
            box-sizing: border-box;
            background-image: url('images/old-paper.jpg');
            background-color: #F4E6C0;
            font-family: 'Georgia', serif;
            color: #313131;
            line-height: 1.6;
            border: 15px solid #D2B48C;
            box-shadow: inset 0 0 20px rgba(139, 69, 19, 0.4);
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.9em;
            color: #8B4513;
            font-style: italic;
        }

        h1, h2, h3 {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            color: #8B4513;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        h1 { font-size: 2.5em; }
        h2 { font-size: 2em; }
        h3 { font-size: 1.5em; }

        p, ul {
            font-size: 1em;
            margin-bottom: 15px;
            font-family: 'Georgia', serif;
        }

        ul {
            list-style-type: none;
            padding-left: 20px;
        }

        ul li::before {
            content: "•";
            color: #8B4513;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }

        .navigation {
            position: absolute;
            top: 50%;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .nav-button {
            background-color: rgba(139, 69, 19, 0.7);
            color: #F4E6C0;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .nav-button:hover {
            background-color: rgba(139, 69, 19, 0.9);
        }

        .nav-button:disabled {
            background-color: rgba(139, 69, 19, 0.3);
            cursor: not-allowed;
        }

        .decorative {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 20px;
            background: url('images/wood-pattern.jpg') repeat;
        }

        .handwriting {
            font-family: 'Cursive', sans-serif;
            font-size: 1.1em;
            color: #4A4A4A;
            text-align: left;
        }
    </style>
</head>
<body>
    <header id="header"></header>

    <main class="container">
        <div class="book-container">
            <div class="clipper"></div>
            <div class="navigation">
                <button id="prevBtn" class="nav-button" disabled><i class="fas fa-chevron-left"></i></button>
                <button id="nextBtn" class="nav-button"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="book" id="book">
                <!-- Pages will be dynamically added here -->
            </div>
        </div>
    </main>

            ];

            function createPage(pageData, index) {
                const page = document.createElement('div');
                page.className = 'page';
                page.innerHTML = `
                    <div class="decorative"></div>
                    <div class="page-content">
                        <h2>${pageData.title}</h2>
                        ${pageData.content}
                        <div class="page-number">${index + 1}</div>
                    </div>
                `;
                return page;
            }

            function showPage(index) {
                book.innerHTML = '';
                const page = createPage(pages[index], index);
                book.appendChild(page);
                updateButtons();
            }

            function updateButtons() {
                prevBtn.disabled = currentPage === 0;
                nextBtn.disabled = currentPage === pages.length - 1;
            }

            function goNextPage() {
                if (currentPage < pages.length - 1) {
                    currentPage++;
                    showPage(currentPage);
                }
            }

            function goPrevPage() {
                if (currentPage > 0) {
                    currentPage--;
                    showPage(currentPage);
                }
            }

            prevBtn.addEventListener('click', goPrevPage);
            nextBtn.addEventListener('click', goNextPage);

            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    goPrevPage();
                } else if (e.key === 'ArrowRight') {
                    goNextPage();
                }
            });

            // Initial setup
            showPage(0);
        });
